<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kejutan Ramadan - Tema Putih Bersih</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="d-flex flex-column min-vh-100" style="background: url('foto.png') no-repeat center center fixed; background-size: cover;">

    <div class="d-flex flex-column min-vh-100 bg-transparent">

        <nav class="navbar navbar-light bg-white shadow-sm py-3">
            <div class="container d-flex justify-content-center">
                <span class="navbar-brand mb-0 h1 fw-bold fs-3 text-success">
                    <i class="bi bi-moon-stars text-warning me-2"></i>Berkah Ramadan
                </span>
            </div>
        </nav>

        <div class="container flex-grow-1 d-flex flex-column justify-content-center align-items-center py-5">
            <div class="row w-100 justify-content-center">
                <div class="col-12 col-md-8 col-lg-6">
                    
                    <div class="card bg-white border-0 rounded-4 shadow-lg text-center p-5">
                        <div class="card-body">
                            <h1 class="display-1 text-success mb-3">
                                <i class="bi bi-moon-stars-fill"></i>
                            </h1>
                            
                            <h1 class="fw-bold text-dark mb-3">Marhaban Ya Ramadan</h1>
                            <p class="fs-5 text-secondary mb-5">
                                Selamat menunaikan ibadah puasa. Mari sucikan hati dan bersihkan jiwa di bulan yang penuh rahmat ini.
                            </p>

                            <button type="button" class="btn btn-success btn-lg rounded-pill shadow-sm fw-bold px-5 py-3" data-bs-toggle="modal" data-bs-target="#thrModal">
                                <i class="bi bi-envelope-paper-fill text-warning me-2"></i> Buka Kejutan Spesial
                            </button>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <footer class="bg-white text-center text-muted py-3 mt-auto shadow-sm">
            <div class="container">
                <small>&copy; 2026 Spesial Ramadan. Tema Bersih & Putih.</small>
            </div>
        </footer>
    </div>

    <div class="modal fade" id="thrModal" tabindex="-1" aria-labelledby="thrModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-white text-dark border-0 rounded-4 shadow-lg">
                
                <div class="modal-header border-0 pb-0 justify-content-end">
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                
                <div class="modal-body text-center py-4">
                    <div class="p-4 bg-success bg-opacity-10 rounded-circle d-inline-block mb-3">
                        <i class="bi bi-wallet2 text-success" style="font-size: 4rem;"></i>
                    </div>
                    
                    <h2 class="fw-bold text-success mt-2">Alhamdulillah!</h2>
                    <p class="fs-5 mt-3 text-secondary">
                        Selamat! Anda mendapatkan <br>
                        <span class="badge bg-warning text-dark fs-2 mt-3 mb-2 px-5 py-3 rounded-pill shadow-sm">THR Spesial 🎉</span>
                    </p>
                    <p class="text-muted mt-3 mb-0">Semoga berkah dan bermanfaat ya!</p>
                </div>
                
                <div class="modal-footer border-0 justify-content-center pb-4">
                    <button type="button" class="btn btn-outline-success rounded-pill px-5 fw-bold py-2" data-bs-dismiss="modal">Alhamdulillah</button>
                </div>
                
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
